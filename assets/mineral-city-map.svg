<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Speculative mineral city cross-section</title>
  <desc id="desc">A stylised island cross-section showing ocean, mineral sand layers, crystal caverns, compute nodes and orbital infrastructure.</desc>
  <defs>
    <linearGradient id="sky" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#12202a"/>
      <stop offset=".42" stop-color="#182c35"/>
      <stop offset="1" stop-color="#071013"/>
    </linearGradient>
    <linearGradient id="sea" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#4fd8df" stop-opacity=".52"/>
      <stop offset=".5" stop-color="#6de7ff" stop-opacity=".34"/>
      <stop offset="1" stop-color="#0e4651" stop-opacity=".62"/>
    </linearGradient>
    <linearGradient id="sand" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f2dd9b"/>
      <stop offset=".38" stop-color="#bd8d50"/>
      <stop offset=".72" stop-color="#2b3238"/>
      <stop offset="1" stop-color="#10161b"/>
    </linearGradient>
    <linearGradient id="metal" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#f9fcff"/>
      <stop offset=".18" stop-color="#a6b2ba"/>
      <stop offset=".42" stop-color="#f2c15e"/>
      <stop offset=".65" stop-color="#7bd9ef"/>
      <stop offset="1" stop-color="#1b2228"/>
    </linearGradient>
    <linearGradient id="crystal" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f8fbff"/>
      <stop offset=".32" stop-color="#94edff"/>
      <stop offset=".66" stop-color="#b891ff"/>
      <stop offset="1" stop-color="#2c3640"/>
    </linearGradient>
    <filter id="softglow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#sky)"/>
